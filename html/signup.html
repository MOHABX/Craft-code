<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codecraft | Join</title>
<link rel="stylesheet" href="../style/signup.css">
</head>
<body>

<div class="box">
    <div class="form-side">
        <h2>Create Account</h2>
        <p>Join our community</p>

        <div class="type-select">
            <div class="type-item">
                <input type="radio" name="role" id="stu" value="student" checked onchange="checkRole()">
                <label for="stu">Student</label>
            </div>
            <div class="type-item">
                <input type="radio" name="role" id="doc" value="doctor" onchange="checkRole()">
                <label for="doc">Instructor</label>
            </div>
        </div>

        <form action="/register" method="POST">
            <div class="field">
                <label>First Name</label>
                <input type="text" name="fname">
            </div>
            <div class="field">
                <label>Last Name</label>
                <input type="text" name="lname">
            </div>

            <div class="field full">
                <label>Email</label>
                <input type="email" name="email">
            </div>

            <div class="field doc-fields">
                <label>Experience</label>
                <input type="number" name="exp">
            </div>

            <div class="field doc-fields">
                <label>Specialty</label>
                <input type="text" name="spec">
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" name="pass">
            </div>

            <div class="field">
                <label>Confirm</label>
                <input type="password" name="cpass">
            </div>

            <button type="submit" class="btn">Sign Up</button>
        </form>
         <p class="footer-text">
            you hav acount?
            <a href="./login.html">log in</a>
        </p>
    </div>

    <div class="img-side"></div>
</div>

<script>
function checkRole() {
    let isDoc = document.getElementById('doc').checked;
    let fields = document.querySelectorAll('.doc-fields');
            
    fields.forEach(item => {
        item.style.display = isDoc ? 'flex' : 'none';
    });
}
</script>

</body>
</html>
