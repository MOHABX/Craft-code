<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Assignment - CodeCraft</title>
<link rel="stylesheet" href="..//style/SUP.CSS">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
<div class="nav-container">
<a href="#" class="logo">CodeCraft</a>

<div class="nav-capsule">
<a href="..//html/home.html">Home</a>
<a href="#">Courses</a>
<a href="#">Instructors</a>
<a href="#">Contact</a>
<a href="#">About Us</a>
</div>

<div class="nav-buttons">
<button class="login-btn">Login</button>
<button class="signup-btn">Sign Up</button>
</div>
</div>
</nav>

<!-- Assignment Page -->
<div class="assignment-container">
<div class="assignment-header">
<div class="badge">💻 Programming 101</div>
<h1 class="main-title">Submit Your Assignment</h1>
</div>

<div class="content-grid">

<!-- Sidebar -->
<div class="sidebar">
<h3>Assignment Info</h3>

<!-- Student Inputs -->
<input type="text" id="studentName" class="comment-input" placeholder="Enter Student Name">
<input type="text" id="studentId" class="comment-input" placeholder="Enter Student ID">

<!-- Display Submitted Info Here -->
<p id="sidebarMessage" class="sidebar-message"></p>

<div class="info-row">
<div class="icon-box">🕒</div>
<div>
<small>Deadline</small><br>
<strong>March 15, 2026</strong>
</div>
</div>

<div class="info-row">
<div class="icon-box">%</div>
<div>
<small>Weight</small><br>
<strong>20%</strong>
</div>
</div>

<p class="description">Upload your programming assignment file before the deadline.</p>
</div>

<!-- Upload Section -->
<div class="upload-main">

<div class="drop-zone" id="dropZone">
<div class="glow-cloud">☁️</div>
<h2 id="statusText">Drag and drop your files here</h2>
<p>Or click to select a file</p>
<input type="file" id="fileInput" hidden>
<div class="progress-container" id="progressCont">
<div class="progress-bar" id="progressBar"></div>
</div>
<p id="percentText" style="display:none">0% Complete</p>
</div>

<textarea class="comment-input" placeholder="Add comments for your instructor..."></textarea>
<button class="btn-submit" id="submitBtn">Submit Assignment ➔</button>

</div>
</div>
</div>

<script src="..//script/SUP.JS"></script>
</body>
</html>
