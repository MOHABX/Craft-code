<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codecraft | Login</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8fafc;
        }

        .login-card {
            display: flex;
            width: 900px;
            max-width: 95%;
            height: 550px;
            background-color: #fff;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-radius: 20px;
            overflow: hidden;
        }

        /* Left Side: Form */
        .form-section {
            width: 50%;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header {
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .header p {
            color: #64748b;
            font-size: 15px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }

        form input[type="email"],
        form input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        form input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .login-btn {
            background-color: #0f172a;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition:0.5;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
        }

        .footer-text {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
        }

        .footer-text a {
            color: var(--3b82f6);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .image-section {
            width: 50%;
            background: #0f172a url('../img/acount.png') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        .image-section::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, rgba(15, 23, 42, 0.6), transparent);
        }

        @media (max-width: 850px) {
            .image-section {
                display: none;
            }
            .form-section {
                width: 100%;
                padding: 40px 30px;
            }
            .login-card {
                height: auto;
            }
        }
    </style>
</head>
<body>

    <main class="login-card">
        <section class="form-section">
            <div class="header">
                <h1>Welcome Back</h1>
                <p>Please enter your details to sign in.</p>
            </div>
            
            <form action="/login" method="POST">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="name@company.com" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">Log In</button>
            </form>

            <p class="footer-text">
                Don't have an account? <a href="./signup.html">Sign up for free</a>
            </p>
        </section>

        <section class="image-section">
            </section>
    </main>

</body>
</html>
