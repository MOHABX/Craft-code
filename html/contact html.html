<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Code Craft</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* Background */

body{
margin:0;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 20px;
color:white;
}

/* Title */

h1{
font-size:38px;
margin-bottom:10px;
}

.subtitle{
opacity:.9;
margin-bottom:45px;
text-align:center;
}

/* Contact Cards */

.contact-grid{

display:flex;
gap:25px;

max-width:1000px;
width:100%;

margin-bottom:45px;

}

.contact-card{

background:white;

flex:1;

border-radius:20px;

padding:35px 20px;

text-align:center;

border:2px solid transparent;

box-shadow:0 10px 25px rgba(0,0,0,.1);

transition:.3s;

text-decoration:none;
color:#333;

}

/* Hover Effect */

.contact-card:hover{

transform:translateY(-8px);

border-color:#ffffff;

box-shadow:0 20px 40px rgba(0,0,0,.2);

}

/* Icons */

.icon{

font-size:30px;

margin-bottom:12px;

}

.email .icon{
color:#ea4335;
}

.whatsapp .icon{
color:#25D366;
}

.facebook .icon{
color:#1877F2;
}

/* Card Text */

.card-title{
font-weight:600;
margin-bottom:8px;
}

.card-link{
font-size:14px;
color:#666;
}

/* Form */

.form-wrapper{

background:white;

max-width:750px;
width:100%;

padding:35px;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.2);

}

/* Inputs */

.form-row{

display:flex;

gap:15px;

margin-bottom:15px;

}

.input-field{

flex:1;

padding:14px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

outline:none;

transition:.2s;

}

.input-field:focus{

border-color:#6C5CE7;

box-shadow:0 0 0 3px rgba(108,92,231,.15);

}

textarea{

width:100%;

height:120px;

resize:none;

margin-top:10px;

}

/* Button */

.submit-btn{

width:100%;

margin-top:18px;

padding:15px;

border:none;

border-radius:10px;

font-size:16px;

font-weight:600;

color:white;

cursor:pointer;

background:linear-gradient(135deg,#FF00FF,#6C5CE7);

transition:.3s;

}

.submit-btn:hover{

transform:translateY(-2px);

box-shadow:0 10px 20px rgba(0,0,0,.3);

}

/* Responsive */

@media(max-width:768px){

.contact-grid{
flex-direction:column;
}

.form-row{
flex-direction:column;
}

}

</style>

</head>

<body>

<h1>Contact Code Craft</h1>

<p class="subtitle">
We are here to help you build your future.
</p>

<div class="contact-grid">

<a href="mailto:hossamadel763@gmail.com" class="contact-card email">

<div class="icon">
<i class="fa-solid fa-envelope"></i>
</div>

<div class="card-title">Email</div>

<div class="card-link">
hossamadel763@gmail.com
</div>

</a>


<a href="https://wa.me/201150726374" class="contact-card whatsapp" target="_blank">

<div class="icon">
<i class="fa-brands fa-whatsapp"></i>
</div>

<div class="card-title">WhatsApp</div>

<div class="card-link">
01150726374
</div>

</a>


<a href="https://www.facebook.com/share/1CGAxYvrKE/" class="contact-card facebook" target="_blank">

<div class="icon">
<i class="fa-brands fa-facebook"></i>
</div>

<div class="card-title">Facebook</div>

<div class="card-link">
Rehab Hossam
</div>

</a>

</div>


<div class="form-wrapper">

<form>

<div class="form-row">

<input type="text" class="input-field" placeholder="Your Name">

<input type="email" class="input-field" placeholder="Your Email">

</div>

<textarea class="input-field" placeholder="How can we help?"></textarea>

<button class="submit-btn">
Send Message
</button>

</form>

</div>

</body>
</html>
