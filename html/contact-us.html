  <style>
    :root {
      --main-gradient: linear-gradient(135deg, #C1B4FE 0%, #7CC6FE 100%);
      --soft-purple: #C1B4FE;
      --dark-text: #2F2F2F;
    }/*  شغلي دماغك تاني واعملي الكود من دماغك وفكري */

    body {
      background: var(--main-gradient);
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* --- Navigation Bar (Like Image) --- */
             nav{
            width: auto;
            height: 80px;
            background-color: #ffffffe9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .left{
            display: flex;
            align-items: center;
        }
        .logo img{
            height: 50px;
        }
        .list ul{
            list-style: none;
            display: flex;
            margin-left: 30px;
        }
        .list ul li{
            margin: 0 15px;
        }
        .list ul li a{
            text-decoration: none;
            color: #333333;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .list ul li a:hover{
            color: #007BFF;
        }
        .right img{
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }


    /* --- Header & Cards --- */
    .header-section { padding: 80px 0; color: white; text-align: center; }
    .info-wrapper { margin-top: -50px; }
    .info-card {
      background: white; border-radius: 20px; padding: 30px;
      text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); height: 100%;
    }
/*  شغلي دماغك تاني واعملي الكود من دماغك وفكري */
    .form-card {
      background: white; padding: 40px; border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08); margin-bottom: 50px;
    }

    /* --- Footer (Like Image) --- */
        footer{
            display: flex;
            /* filter: blur(1px); */
            background: linear-gradient(90deg,#63c7e0 20%,#aa92cc 100%);
            
        }
        footer .left, footer .center, footer .right{
            
            background-color: #ffffffa0;
            
            width: 33.3%;
            max-width: 33.3%;
            padding: 10px;
            text-align: center;
        }


        footer .left img{
            width: 100px;
            height: 90px;
            margin-right: 50%;
            margin-bottom: 5%;
            transition: 1s;
        }

        footer .left img:hover{
            transform: scale(1.1); 
            transition: 0.5s;
        }

        footer .left ul , footer .center ul{
            list-style: none;
            padding: 0;
        }


        footer .left ul li , footer .center ul li{
            margin: 8px 0;

        }

        footer .left ul li a ,footer .center ul li a{
            text-decoration: none;
            color: black;
            font-size: 18px;
            transition: 1s;
        }

         footer .left ul li a:hover{
            color: blue;
            /* border-bottom: 1px solid blue; */
            transition: 1s;
        }

        
        footer .center h3{
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .light-and-night-mode {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .light-and-night-mode button {
            width: 40px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            align-items: right;
            padding: 4px;
        }
        .light-and-night-mode img {
            width: 20px;
            height: 20px;
            display: block;

        }
        footer .right .light-and-night-mode{
            display: flex;
            margin-left: 70%;
            margin-bottom: 20%;

        }




  </style>
</head>
